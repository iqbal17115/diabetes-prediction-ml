<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডায়াবেটিস প্রেডিকশন</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 1rem; }
        .progress-bar { font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">ডায়াবেটিস প্রেডিকশন</h2>

                    <form id="predictForm">
                        <div class="mb-3">
                            <label class="form-label">গর্ভধারণ সংখ্যা (Pregnancies)</label>
                            <input type="number" name="Pregnancies" class="form-control" value="2" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">গ্লুকোজ (Glucose)</label>
                            <input type="number" name="Glucose" class="form-control" value="120" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">রক্তচাপ (Blood Pressure)</label>
                            <input type="number" name="BloodPressure" class="form-control" value="70" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ত্বকের পুরুত্ব (Skin Thickness)</label>
                            <input type="number" name="SkinThickness" class="form-control" value="25" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ইনসুলিন (Insulin)</label>
                            <input type="number" name="Insulin" class="form-control" value="100" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">বিএমআই (BMI)</label>
                            <input type="number" name="BMI" class="form-control" value="28" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ডায়াবেটিস পেডিগ্রি ফাংশন (Diabetes Pedigree Function)</label>
                            <input type="number" step="0.01" name="DiabetesPedigreeFunction" class="form-control" value="0.5" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">বয়স (Age)</label>
                            <input type="number" name="Age" class="form-control" value="32" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">প্রেডিক্ট করুন</button>
                    </form>

                    <div id="result" class="mt-4 text-center"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS + Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const form = document.getElementById("predictForm");
const resultEl = document.getElementById("result");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    // Read input values
    const formData = Object.fromEntries(new FormData(form).entries());
    for (let key in formData) formData[key] = parseFloat(formData[key]);

    // Show loading spinner
    resultEl.innerHTML = `
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">লোড হচ্ছে...</span>
        </div>
    `;

    try {
        const res = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(formData)
        });

        if (!res.ok) throw new Error("সার্ভার থেকে সঠিক উত্তর আসেনি");

        const data = await res.json();

        const predictionText = data.prediction === 1 ? "ডায়াবেটিস আছে" : "ডায়াবেটিস নেই";
        const probability = (data.probability[data.prediction] * 100).toFixed(2);

        // Show result with progress bar
        resultEl.innerHTML = `
            <div class="alert ${data.prediction === 1 ? 'alert-danger' : 'alert-success'}">
                <strong>ফলাফল:</strong> ${predictionText} <br>
                <strong>বিশ্বাসযোগ্যতা:</strong>
                <div class="progress mt-1">
                    <div class="progress-bar ${data.prediction === 1 ? 'bg-danger' : 'bg-success'}" 
                         role="progressbar" 
                         style="width: ${probability}%;" 
                         aria-valuenow="${probability}" 
                         aria-valuemin="0" 
                         aria-valuemax="100">
                         ${probability}%
                    </div>
                </div>
            </div>
        `;
    } catch (error) {
        resultEl.innerHTML = `<div class="alert alert-warning">ত্রুটি: ${error.message}</div>`;
    }
});
</script>

</body>
</html>
